services:
  - type: web
    name: lcts-backend
    runtime: node
    buildCommand: npm --prefix backend install
    startCommand: npm --prefix backend start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: MAX_BACKUPS
        value: "1000"
      - key: BACKUP_CRON_SECRET
        sync: false

  - type: cron
    name: lcts-weekly-backup
    runtime: node
    schedule: "0 3 * * 1"
    buildCommand: npm --prefix backend install
    startCommand: npm --prefix backend run cron:backup
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: BACKUP_CRON_SECRET
        sync: false